    container_name: dream-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ssjwd^DW2238WD
      MYSQL_DATABASE: dream_db
      MYSQL_USER: dream_user
      MYSQL_PASSWORD: 1a^cMnYk5jqb
